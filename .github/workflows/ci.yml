name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests (Laravel)

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: simplepos_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, pdo_mysql, bcmath, soap, intl, gd, exif, iconv
          coverage: xdebug

      - name: Copy environment file
        run: cp backend/.env.example backend/.env

      - name: Update environment file
        run: |
          cd backend
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=simplepos_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=secret/' .env

      - name: Install Composer dependencies
        run: |
          cd backend
          composer install --prefer-dist --no-progress --no-suggest

      - name: Generate application key
        run: |
          cd backend
          php artisan key:generate

      - name: Run database migrations
        run: |
          cd backend
          php artisan migrate --force

      - name: Run backend tests
        run: |
          cd backend
          php artisan test --coverage

  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend Tests (Vue + Quasar)

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Run unit tests
        run: |
          cd frontend
          npm run test

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Composer dependencies
        run: |
          cd backend
          composer install --prefer-dist --no-progress

      - name: Run security audit (Composer)
        run: |
          cd backend
          composer audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install npm dependencies
        run: |
          cd frontend
          npm ci

      - name: Run security audit (npm)
        run: |
          cd frontend
          npm audit --audit-level=critical

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: [backend-tests, frontend-tests, security-scan]
    runs-on: ubuntu-latest
    name: Deploy to Staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add actual deployment commands here

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: [backend-tests, frontend-tests, security-scan]
    runs-on: ubuntu-latest
    name: Deploy to Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add actual deployment commands here
